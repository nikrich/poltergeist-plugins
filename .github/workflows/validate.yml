name: validate

on:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm test
      # all entries, not just the changed ones — cheap at this scale and
      # catches upstream repos that drifted since their entry merged
      - run: node scripts/validate.mjs
